<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Plan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="planner">
        <header>
            <h1>WEEKLY PLAN</h1>
        </header>
        <section class="week-info">
            <div>
                <label for="week-of">Week of:</label>
                <input type="text" id="week-of" placeholder="Enter week">
            </div>
            <div>
                <label for="healthy-habit">Healthy Habit:</label>
                <input type="text" id="healthy-habit" placeholder="Enter habit">
            </div>
            <div>
                <label for="room-for-improvement">Room for Improvement:</label>
                <input type="text" id="room-for-improvement" placeholder="Enter improvements">
            </div>
        </section>
        <main class="planner-body">
            <aside class="left-panel">
                <div class="goals">
                    <h2>TOP 3 GOALS</h2>
                    <ul>
                        <li><input type="checkbox"> <input type="text" placeholder="Goal 1"></li>
                        <li><input type="checkbox"> <input type="text" placeholder="Goal 2"></li>
                        <li><input type="checkbox"> <input type="text" placeholder="Goal 3"></li>
                    </ul>
                </div>
                <div class="everything-else">
                    <h2>EVERYTHING ELSE</h2>
                    <ul>
                        <li><input type="checkbox"> <input type="text" placeholder="Task"></li>
                        <li><input type="checkbox"> <input type="text" placeholder="Task"></li>
                        <li><input type="checkbox"> <input type="text" placeholder="Task"></li>
                    </ul>
                </div>
                <div class="next-week">
                    <h2>NEXT WEEK</h2>
                    <ul>
                        <li><input type="checkbox"> <input type="text" placeholder="Plan"></li>
                        <li><input type="checkbox"> <input type="text" placeholder="Plan"></li>
                    </ul>
                </div>
            </aside>
            <div class="weekly-grid">
                <div class="day">
                    <h3>MONDAY</h3>
                    <textarea placeholder="Notes"></textarea>
                </div>
                <div class="day">
                    <h3>TUESDAY</h3>
                    <textarea placeholder="Notes"></textarea>
                </div>
                <div class="day">
                    <h3>WEDNESDAY</h3>
                    <textarea placeholder="Notes"></textarea>
                </div>
                <div class="day">
                    <h3>THURSDAY</h3>
                    <textarea placeholder="Notes"></textarea>
                </div>
                <div class="day">
                    <h3>FRIDAY</h3>
                    <textarea placeholder="Notes"></textarea>
                </div>
                <div class="day">
                    <h3>SATURDAY</h3>
                    <textarea placeholder="Notes"></textarea>
                </div>
                <div class="day">
                    <h3>SUNDAY</h3>
                    <textarea placeholder="Notes"></textarea>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
