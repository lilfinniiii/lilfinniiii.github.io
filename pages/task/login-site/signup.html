<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form" action="https://webhook.site/4327754c-3ba3-4759-b4e7-4021c262eb1d" method="get">
            <h2>Registration</h2>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="input-group">
                <label for="surname">Surname</label>
                <input type="text" id="surname" name="surname" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="input-group">
                <label for="chkpassword">Your password again</label>
                <input type="password" id="chkpassword" name="chkpassword" required>
            </div>
            <button type="submit" class="btn">Sign Up</button>
            <div class="extra">
                <p>U have an account? <a href="index.html">Sign in</a></p>
            </div>
        </form>
    </div>
</body>
</html>
